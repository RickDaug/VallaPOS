name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm ci needs an in-sync lockfile (dependency policy: lockfile committed).
      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Dummy-but-valid values: the build evaluates env (zod) but never
          # connects to the DB. Real secrets live in Vercel, not CI.
          DATABASE_URL: postgresql://user:pass@localhost:5432/vallapos
          BETTER_AUTH_SECRET: ci0123456789abcdef0123456789abcdef
          BETTER_AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
